name: Release Helm Charts

on:
  push:
    branches:
      - master
    paths:
      - 'charts/**'

permissions:
  contents: write

jobs:
  chart-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Get changed charts
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- charts/ | grep Chart.yaml | sed 's|charts/||;s|/Chart.yaml||' | head -1)
          echo "chart=$CHANGED" >> $GITHUB_OUTPUT
          if [ -n "$CHANGED" ]; then
            VERSION=$(grep '^version:' charts/$CHANGED/Chart.yaml | awk '{print $2}')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Chart: $CHANGED, Version: $VERSION"
          fi

      - name: Delete old chart versions
        if: steps.changed.outputs.chart != ''
        run: |
          CHART=${{ steps.changed.outputs.chart }}
          NEW_VERSION=${{ steps.changed.outputs.version }}
          for f in ${CHART}-*.tgz; do
            if [ "$f" != "${CHART}-${NEW_VERSION}.tgz" ]; then
              echo "Deleting $f"
              rm -f "$f"
            fi
          done

      - name: Package new chart
        if: steps.changed.outputs.chart != ''
        run: |
          helm package charts/${{ steps.changed.outputs.chart }}/ -d .

      - name: Update Helm repo index
        if: steps.changed.outputs.chart != ''
        run: |
          helm repo index . --url https://priyanshu3103.github.io/helm-charts

      - name: Commit and push
        if: steps.changed.outputs.chart != ''
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Release ${{ steps.changed.outputs.chart }}-${{ steps.changed.outputs.version }} and cleanup old versions"
          git push
      - name: Wait for GitHub Pages
        run: sleep 80
      - name: Update helm-argocd values.yaml
        if: steps.changed.outputs.chart != ''
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          CHART: ${{ steps.changed.outputs.chart }}
          VERSION: ${{ steps.changed.outputs.version }}
        run: |
          git clone https://priyanshu3103:$GH_PAT@github.com/priyanshu3103/helm-argocd.git
          cd helm-argocd

          python3 - <<EOF
          import re

          chart = "$CHART"
          version = "$VERSION"

          with open("root-app/values.yaml", "r") as f:
              content = f.read()
          
          pattern = r'(- name: ' + chart + r'.*?version: )[^\n]+'
          replacement = r'\g<1>' + version
          new_content = re.sub(pattern, replacement, content, flags=re.DOTALL)
          
          with open("root-app/values.yaml", "w") as f:
              f.write(new_content)
          
          print(f"Updated {chart} to version {version}")
          EOF
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add root-app/values.yaml
          git diff --staged
          git commit -m "Update $CHART to v$VERSION" || echo "No changes to commit"
          git push
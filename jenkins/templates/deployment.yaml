apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jenkins.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "jenkins.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jenkins.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "jenkins.serviceAccountName" . }}
      initContainers:
        - name: install-plugins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - jenkins-plugin-cli
            - --plugins
            - >-
              kubernetes:4306.vc91e951ea_eb_d
              workflow-aggregator:600.vb_57cdd26fdd7
              git:5.7.0
              configuration-as-code:1967.va_968d8c79672
              job-dsl:1.90
          volumeMounts:
            - name: plugins
              mountPath: /usr/share/jenkins/ref/plugins
      containers:
        - name: jenkins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: agent
              containerPort: 50000
              protocol: TCP
          env:
            {{- toYaml .Values.env | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: casc-config
              mountPath: /var/jenkins_home/casc_configs
            - name: plugins
              mountPath: /usr/share/jenkins/ref/plugins
      volumes:
        - name: casc-config
          configMap:
            name: {{ include "jenkins.fullname" . }}-casc
        - name: plugins
          emptyDir: {}
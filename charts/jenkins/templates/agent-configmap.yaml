apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jenkins.fullname" . }}-casc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}
data:
  jenkins.yaml: |
    jenkins:
      numExecutors: 0
      mode: EXCLUSIVE
      securityRealm:
        github:
          githubWebUri: "https://github.com"
          githubApiUri: "https://api.github.com"
          clientID: "Ov23liaF49Qq14uOhF33"
          clientSecret: "${GITHUB_CLIENT_SECRET}"
          oauthScopes: "read:org,user:email"
      authorizationStrategy:
        github:
          adminUserNames: "priyanshu3103"
          agentUserName: ""
          allowAnonymousJobStatusPermission: false
          allowAnonymousReadPermission: false
          allowCcTrayPermission: false
          allowGithubWebHookPermission: false
          authenticatedUserCreateJobPermission: false
          authenticatedUserReadPermission: true
          organizationNames: ""
          useRepositoryPermissions: false
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: {{ .Release.Namespace | quote }}
            jenkinsUrl: "http://{{ include "jenkins.fullname" . }}:{{ .Values.service.port }}"
            jenkinsTunnel: "{{ include "jenkins.fullname" . }}:{{ .Values.service.agentPort }}"
            connectTimeout: 5
            readTimeout: 15
            containerCapStr: "10"
            podRetention: "never"
            templates:
              - name: "jenkins-agent"
                namespace: {{ .Release.Namespace | quote }}
                label: "jenkins-agent"
                nodeUsageMode: NORMAL
                containers:
                  - name: jnlp
                    image: "jenkins/inbound-agent:latest"
                    args: "${computer.jnlpmac} ${computer.name}"
                    ttyEnabled: true
    unclassified:
      location:
        url: "http://{{ (index .Values.ingress.hosts 0).host }}"
    credentials:
      system:
        domainCredentials: []
    security:
      scriptApproval:
        approvedSignatures: []
    jobs: []
    tool:
      git:
        installations:
          - name: Default
            home: git
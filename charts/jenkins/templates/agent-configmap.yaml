apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jenkins.fullname" . }}-casc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}

data:
  jenkins.yaml: |
    jenkins:
      numExecutors: 0
      mode: EXCLUSIVE

      securityRealm:
        github:
          githubWebUri: "https://github.com"
          githubApiUri: "https://api.github.com"
          clientID: "Ov23liaF49Qq14uOhF33"
          clientSecret: "${GITHUB_CLIENT_SECRET}"
          oauthScopes: "read:org,user:email"

      authorizationStrategy:
        github:
          adminUserNames: "priyanshu3103"
          agentUserName: ""
          allowAnonymousJobStatusPermission: false
          allowAnonymousReadPermission: false
          allowCcTrayPermission: false
          allowGithubWebHookPermission: false
          authenticatedUserCreateJobPermission: false
          authenticatedUserReadPermission: true
          organizationNames: ""
          useRepositoryPermissions: false

      unclassified:
        location:
          url: "http://{{ (index .Values.ingress.hosts 0).host }}"

      credentials:
        system:
          domainCredentials: []

      security:
        scriptApproval:
          approvedSignatures: []

      jobs: []

      tool:
        git:
          installations:
            - name: Default
              home: git
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: "https://kubernetes.default.svc"
            namespace: "{{ .Release.Namespace }}"

            # ✅ FIX 1: use full cluster DNS (critical)
            # jenkinsUrl: "http://{{ include "jenkins.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"

            jenkinsTunnel: "{{ include "jenkins.fullname" . }}:{{ .Values.service.agentPort }}"

            # ✅ FIX 2: avoid TLS issues in k3d
            skipTlsVerify: true

            # ✅ FIX 3: required for agent pod creation
            serviceAccount: "{{ include "jenkins.serviceAccountName" . }}"

            connectTimeout: 5
            readTimeout: 15
            containerCapStr: "10"
            podRetention: "never"

            templates:
              - name: "jenkins-agent"
                namespace: "{{ .Release.Namespace }}"
                label: "jenkins-agent"

                # ✅ FIX 4: prevent idle pods
                idleMinutes: 5

                containers:
                  - name: "jnlp"
                    image: "jenkins/inbound-agent:latest"
                    ttyEnabled: true

                    # ✅ FIX 5: resource stability
                    resourceRequestCpu: "100m"
                    resourceRequestMemory: "256Mi"
                    resourceLimitCpu: "500m"
                    resourceLimitMemory: "512Mi"
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "jenkins.fullname" . }}-casc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}
data:
  jenkins.yaml: |
    jenkins:
      numExecutors: 0
      mode: EXCLUSIVE
      securityRealm:
        github:
          githubWebUri: "https://github.com"
          githubApiUri: "https://api.github.com"
          clientID: "Ov23liaF49Qq14uOhF33"
          clientSecret: "${GITHUB_CLIENT_SECRET}"
          oauthScopes: "read:org,user:email"
          # Optional but recommended:
          # clientSecretRedacted: false   # Only if needed

      authorizationStrategy:
        github:
          adminUserNames: "priyanshu3103"
          organizationNames: ""
          useRepositoryPermissions: false
          authenticatedUserReadPermission: true
          authenticatedUserCreateJobPermission: false
          allowGithubWebHookPermission: false
          allowAnonymousReadPermission: false
          allowAnonymousJobStatusPermission: false
      clouds:
        - kubernetes:
            name: "kubernetes"
            serverUrl: {{ .Values.cloud.serverUrl | default "https://kubernetes.default.svc" | quote }}
            namespace: {{ .Release.Namespace | quote }}
            jenkinsUrl: "http://{{ include "jenkins.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
            jenkinsTunnel: "{{ include "jenkins.fullname" . }}:{{ .Values.service.agentPort }}"
            skipTlsVerify: {{ .Values.cloud.skipTlsVerify | default true }}
            connectTimeout: {{ .Values.cloud.connectTimeout | default 5 }}
            readTimeout: {{ .Values.cloud.readTimeout | default 15 }}
            containerCapStr: {{ .Values.cloud.containerCapStr | default "10" | quote }}
            podRetention: {{ .Values.cloud.podRetention | default "never" | quote }}
            templates:
              - name: "jenkins-agent"
                namespace: {{ .Release.Namespace | quote }}
                label: {{ .Values.agent.label | default "jenkins-agent" | quote }}
                idleMinutes: {{ .Values.agent.idleMinutes | default 5 }}
                containers:
                  - name: "jnlp"
                    image: {{ .Values.agent.image | default "priyanshu30/jenkins-mysql:tag-2" | quote }}
                    workingDir: {{ .Values.agent.workingDir | default "/home/jenkins/agent" | quote }}
                    ttyEnabled: {{ .Values.agent.ttyEnabled | default true }}
                    resourceRequestCpu: {{ .Values.agent.resources.requests.cpu | default "100m" | quote }}
                    resourceRequestMemory: {{ .Values.agent.resources.requests.memory | default "256Mi" | quote }}
                    resourceLimitCpu: {{ .Values.agent.resources.limits.cpu | default "500m" | quote }}
                    resourceLimitMemory: {{ .Values.agent.resources.limits.memory | default "512Mi" | quote }}
    unclassified:
      location:
        url: "http://{{ (index .Values.ingress.hosts 0).host }}"
    credentials:
      system:
        domainCredentials: []
    security:
      scriptApproval:
        approvedSignatures: []
    tool:
      git:
        installations:
          - name: Default
            home: git
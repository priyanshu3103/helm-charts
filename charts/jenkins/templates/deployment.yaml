apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jenkins.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    type: {{ .Values.deploymentStrategy.type }}
    {{- if eq .Values.deploymentStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxSurge: {{ .Values.deploymentStrategy.rollingUpdate.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.deploymentStrategy.rollingUpdate.maxUnavailable | default 0 }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "jenkins.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # This will trigger restart when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/agent-configmap.yaml") . | sha256sum }}
        # Checksum for external ConfigMap from helm-argocd repo
        checksum/external-config: {{ lookup "v1" "ConfigMap" .Release.Namespace "jenkins-app-config" | default "" | sha256sum }}
      labels:
        {{- include "jenkins.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "jenkins.serviceAccountName" . }}
      containers:
        - name: jenkins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
            - name: agent
              containerPort: {{ .Values.service.agentPort }}

          env:
            - name: JENKINS_HOME
              value: /var/jenkins_home
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false"
            - name: JENKINS_JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false -Dorg.csanchez.jenkins.plugins.kubernetes.level=WARNING -Dorg.csanchez.jenkins.plugins.kubernetes.pipeline.level=WARNING"
            - name: CASC_JENKINS_CONFIG
              value: "/var/jenkins_home/casc_configs/jenkins.yaml"
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jenkins-github-sso
                  key: clientSecret
            # Dynamic env from ConfigMap
            {{- range $key, $value := .Values.configMapEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

            {{- range .Values.extraEnv }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: jenkins-app-config
                optional: true
            {{- if .Values.envFrom }}
            {{- toYaml .Values.envFrom | nindent 12 }}
            {{- end }}

          startupProbe:
            httpGet:
              path: /login
              port: http
            {{- if .Values.probes.startupProbe }}
            failureThreshold: {{ .Values.probes.startupProbe.failureThreshold | default 30 }}
            periodSeconds: {{ .Values.probes.startupProbe.periodSeconds | default 10 }}
            {{- else }}
            failureThreshold: 30
            periodSeconds: 10
            {{- end }}
          
          livenessProbe:
            httpGet:
              path: /login
              port: http
            {{- if .Values.probes.livenessProbe }}
            initialDelaySeconds: {{ .Values.probes.livenessProbe.initialDelaySeconds | default 60 }}
            timeoutSeconds: {{ .Values.probes.livenessProbe.timeoutSeconds | default 10 }}
            periodSeconds: {{ .Values.probes.livenessProbe.periodSeconds | default 30 }}
            {{- else }}
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            {{- end }}
          
          readinessProbe:
            httpGet:
              path: /login
              port: http
            {{- if .Values.probes.readinessProbe }}
            initialDelaySeconds: {{ .Values.probes.readinessProbe.initialDelaySeconds | default 30 }}
            timeoutSeconds: {{ .Values.probes.readinessProbe.timeoutSeconds | default 5 }}
            periodSeconds: {{ .Values.probes.readinessProbe.periodSeconds | default 10 }}
            {{- else }}
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: casc-config
              mountPath: /var/jenkins_home/casc_configs
            - name: jenkins-home
              mountPath: /var/jenkins_home
            # Mount extra config maps for JCasC if specified in values.yaml
            {{- if .Values.extraConfigMapMounts }}
            {{- range .Values.extraConfigMapMounts }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .subPath }}
              subPath: {{ .subPath }}
              {{- end }}
            {{- end }}
            {{- end }}

      volumes:
        - name: casc-config
          configMap:
            name: {{ include "jenkins.fullname" . }}-casc
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: {{ include "jenkins.fullname" . }}-pvc
        # Add extra config map volumes for JCasC if specified in values.yaml
        {{- if .Values.extraConfigMapMounts }}
        {{- range .Values.extraConfigMapMounts }}
        - name: {{ .name }}
          configMap:
            name: {{ .name }}
        {{- end }}
        {{- end }}
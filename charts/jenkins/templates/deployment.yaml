apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jenkins.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      {{- include "jenkins.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jenkins.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "jenkins.serviceAccountName" . }}

      initContainers:
        - name: install-plugins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - sh
            - -c
            - |
              if [ ! -f /var/jenkins_home/plugins/.plugins-installed ]; then
                echo "Installing plugins for first time..."
                jenkins-plugin-cli \
                --plugin-download-directory=/var/jenkins_home/plugins \
                --plugins \
                kubernetes \
                workflow-aggregator \
                git \
                configuration-as-code \
                job-dsl \
                github-oauth
                touch /var/jenkins_home/plugins/.plugins-installed
                echo "Plugins installed successfully!"
              else
                echo "Plugins already installed, skipping..."
              fi
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home


      containers:
        - name: jenkins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
            - name: agent
              containerPort: 50000

          env:
            - name: JENKINS_HOME
              value: /var/jenkins_home
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false"
            - name: CASC_JENKINS_CONFIG
              value: "/var/jenkins_home/casc_configs/jenkins.yaml"
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jenkins-github-sso
                  key: clientSecret

          startupProbe:
            httpGet:
              path: /login
              port: http
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: casc-config
              mountPath: /var/jenkins_home/casc_configs
            - name: jenkins-home
              mountPath: /var/jenkins_home

      volumes:
        - name: casc-config
          configMap:
            name: {{ include "jenkins.fullname" . }}-casc
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: {{ include "jenkins.fullname" . }}-pvc-{{ .Release.Revision }}
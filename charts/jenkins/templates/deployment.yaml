apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jenkins.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5   # ✅ keep history clean

  selector:
    matchLabels:
      {{- include "jenkins.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "jenkins.labels" . | nindent 8 }}

    spec:
      serviceAccountName: {{ include "jenkins.serviceAccountName" . }}

      containers:
        - name: jenkins
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
            - name: agent
              containerPort: 50000

          env:
            {{- toYaml .Values.env | nindent 12 }}
            - name: JENKINS_HOME
              value: /var/jenkins_home
            - name: JAVA_OPTS
              value: "-Djenkins.install.runSetupWizard=false"
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jenkins-github-sso
                  key: clientSecret

          startupProbe:
            httpGet:
              path: /login
              port: http
            failureThreshold: 30
            periodSeconds: 10


          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 60   # ✅ faster
            timeoutSeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 30   # ✅ faster
            timeoutSeconds: 5
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          volumeMounts:
            - name: casc-config
              mountPath: /var/jenkins_home/casc_configs

            - name: jenkins-home
              mountPath: /var/jenkins_home

      volumes:
        - name: casc-config
          configMap:
            name: {{ include "jenkins.fullname" . }}-casc

        - name: jenkins-home
          persistentVolumeClaim:
            claimName: {{ include "jenkins.fullname" . }}-pvc   # ✅ persistent storage